name: Borsa Robotu Tarama

on:
  schedule:
    # Her 15 dakikada bir çalışacak
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Manuel tetikleme desteği

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # ← Maksimum 10 dakika; takılırsa otomatik iptal
    permissions:
      contents: write # Repoya geri push yapabilmek için

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Botu Çalıştır
        timeout-minutes: 8     # ← Bot adımı da max 8 dakika
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: |
          python borsa_robotu.py

      - name: Değişiklikleri Kaydet (Commit & Push)
        if: always()           # ← Bot takılsa bile push dene
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gonderilen_sinyaller.json dashboard.html || true
          git commit -m "Bot Taraması: Sinyaller ve Dashboard Güncellendi [skip ci]" || echo "Değişiklik yok"
          git push || echo "Push başarısız oldu veya güncellenecek bir şey yok"
